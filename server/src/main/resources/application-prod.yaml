# ===================================================================
# Production profile
# Activate: --spring.profiles.active=prod
# ===================================================================

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  # OAuth2 social login — uncomment when client IDs are configured
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         google:
  #           client-id: ${GOOGLE_CLIENT_ID}
  #           client-secret: ${GOOGLE_CLIENT_SECRET}
  #         github:
  #           client-id: ${GITHUB_CLIENT_ID}
  #           client-secret: ${GITHUB_CLIENT_SECRET}

logging:
  level:
    me.nghlong3004.olympic: INFO
    org.springframework.security: WARN

olympic:
  client:
    base-url: ${WEB_BASE_URL}
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      access-expiration: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION_MINUTES:10080}
    cookie:
      secure: true
      same-site: ${COOKIE_SAME_SITE:None}
