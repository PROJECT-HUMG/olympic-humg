# ===================================================================
# Development profile
# Activate: --spring.profiles.active=dev (default)
# ===================================================================

server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/olympic_humg_dev}
    username: ${DB_USERNAME:olympic_humg}
    password: ${DB_PASSWORD:olympic_secret}

  # OAuth2 social login — uncomment when client IDs are configured
  # security:
  #   oauth2:
  #     client:
  #       registration:
  #         google:
  #           client-id: ${GOOGLE_CLIENT_ID}
  #           client-secret: ${GOOGLE_CLIENT_SECRET}
  #         github:
  #           client-id: ${GITHUB_CLIENT_ID}
  #           client-secret: ${GITHUB_CLIENT_SECRET}

logging:
  level:
    me.nghlong3004.olympic: DEBUG
    org.springframework.security: DEBUG

olympic:
  client:
    base-url: ${WEB_BASE_URL:http://localhost:3000}
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:dev-secret-key-with-at-least-32-bytes-long}
      access-expiration: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION_MINUTES:10080}
    cookie:
      secure: ${COOKIE_SECURE:false}
      same-site: ${COOKIE_SAME_SITE:Lax}
